<a
  class="algorithm-card-link"
  [routerLink]="['/visualizations/algorithms', algorithm.id]"
>
  <mat-card class="algorithm-card">
    <mat-card-header>
      <mat-card-title>{{ algorithm.name }}</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <p class="summary">{{ algorithm.summary }}</p>
      @if (algorithm.paradigm) {
        <mat-chip-set>
          <mat-chip>{{ algorithm.paradigm }}</mat-chip>
        </mat-chip-set>
      }
    </mat-card-content>
  </mat-card>
</a>
